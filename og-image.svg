    <text x="-180" y="50" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="10" fill="#888899" text-anchor="middle">RBOWS 1</text>

    <rect x="-120" y="-30" width="60" height="60" rx="8" fill="#00d4ff"/>
